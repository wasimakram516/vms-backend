name: Deploy Sinan VMS Backend

on:
  push:
    branches:
      - main
      - uat

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            package-lock.json

  deploy-prod:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, backend, production]
    environment: Production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Prepare production directory
        run: |
          sudo mkdir -p /var/www/sinan/backend
          sudo chown -R ubuntu:ubuntu /var/www/sinan
          cd /var/www/sinan/backend
          rm -rf node_modules dist || true
          cp -r $GITHUB_WORKSPACE/dist ./dist
          cp $GITHUB_WORKSPACE/package.json .
          cp $GITHUB_WORKSPACE/package-lock.json .

      - name: Create production .env
        run: |
          cd /var/www/sinan/backend
          sudo rm -f .env
          sudo touch .env
          sudo tee .env > /dev/null <<EOF
          NODE_ENV=production
          PORT=4000
          API_PREFIX=api/v1
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_LOGGING=false
          JWT_EXPIRES_IN=7d
          THROTTLE_TTL=60000
          THROTTLE_LIMIT=100
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MASTER_KEY=${{ secrets.MASTER_KEY }}
          SUPERADMIN_EMAIL=${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD=${{ secrets.SUPERADMIN_PASSWORD }}
          SUPERADMIN_FULL_NAME=${{ secrets.SUPERADMIN_FULL_NAME }}
          EOF

      - name: Install production dependencies & restart PM2
        run: |
          cd /var/www/sinan/backend
          npm ci --omit=dev
          pm2 restart sinan-vms-backend --update-env || pm2 start dist/main.js --name "sinan-vms-backend"
          pm2 save

  deploy-uat:
    name: Deploy to UAT
    needs: build
    if: github.ref == 'refs/heads/uat'
    runs-on: [self-hosted, backend, uat]
    environment: UAT

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Prepare UAT directory
        run: |
          sudo mkdir -p /var/www/sinan/backend
          sudo chown -R ubuntu:ubuntu /var/www/sinan
          cd /var/www/sinan/backend
          rm -rf node_modules dist || true
          cp -r $GITHUB_WORKSPACE/dist ./dist
          cp $GITHUB_WORKSPACE/package.json .
          cp $GITHUB_WORKSPACE/package-lock.json .

      - name: Create UAT .env
        run: |
          cd /var/www/sinan/backend
          sudo rm -f .env
          sudo touch .env
          sudo tee .env > /dev/null <<EOF
          NODE_ENV=production
          PORT=4000
          API_PREFIX=api/v1
          DATABASE_HOST=localhost
          DATABASE_PORT=5432
          DATABASE_LOGGING=false
          JWT_EXPIRES_IN=7d
          THROTTLE_TTL=60000
          THROTTLE_LIMIT=100
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MASTER_KEY=${{ secrets.MASTER_KEY }}
          SUPERADMIN_EMAIL=${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD=${{ secrets.SUPERADMIN_PASSWORD }}
          SUPERADMIN_FULL_NAME=${{ secrets.SUPERADMIN_FULL_NAME }}
          EOF

      - name: Install production dependencies & restart PM2
        run: |
          cd /var/www/sinan/backend
          npm ci --omit=dev
          pm2 restart sinan-vms-backend-uat --update-env || pm2 start dist/main.js --name "sinan-vms-backend-uat"
          pm2 save
